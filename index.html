<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 비법 로또 추첨기</title>
    <style>
        :root { --bg-color: #f4f6f9; --card-color: #ffffff; --primary-color: #2563eb; --text-color: #1f2937; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: var(--card-color); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 25px; color: var(--primary-color); line-height: 1.4; }
        .status-box { background: #eff6ff; color: #1d4ed8; padding: 12px; border-radius: 10px; text-align: center; font-size: 0.85rem; margin-bottom: 20px; font-weight: bold; border: 1px solid #bfdbfe; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width:100%; }
        button:active { background: #1d4ed8; }
        .result-section { margin-top: 30px; width: 100%; }
        .ball-container { display: flex; justify-content: space-between; margin-top: 15px; margin-bottom: 25px; width: 100%; min-height: 50px; }
        .ball { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ball.range1 { background: #fbc02d; } .ball.range2 { background: #1976d2; } .ball.range3 { background: #d32f2f; } .ball.range4 { background: #7b1fa2; } .ball.range5 { background: #388e3c; }
        .analysis-box { background: #f8fafc; border-radius: 10px; padding: 15px; font-size: 0.9rem; line-height: 1.7; border-left: 4px solid var(--primary-color); color: #1f2937; min-height: 100px; }
        h3 { color: #1f2937; margin-top: 20px; margin-bottom: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔮 100% 실시간 공식 데이터 연동<br>나만의 비법 추첨기</h1>
    <div class="status-box" id="engine-status">📡 동행복권 오픈 API 실시간 추적 대기 중</div>
    <div class="input-group">
        <label for="th-input">예측/분석할 회차 입력</label>
        <input type="number" id="th-input" value="1225">
    </div>
    <button onclick="startAnalysis()">나만의 비법으로 실시간 조회 및 추첨</button>
    
    <div class="result-section">
        <h3>추천 번호</h3>
        <div class="ball-container" id="ball-container">
            <span style="color:#9ca3af; font-size:0.9rem; margin:auto;">버튼을 누르면 정부 공인 로또 데이터를 긁어옵니다.</span>
        </div>
        <h3>📊 알고리즘 분석 결과</h3>
        <div class="analysis-box" id="analysis-box">
            과거 10회 단위 실제 당첨 번호 조합의 홀짝 비율(0:6 ~ 6:0) 전수조사 통계가 여기에 표시됩니다.
        </div>
    </div>
</div>

<script>
// 동행복권 공식 서버에서 특정 회차의 진짜 당첨 번호를 실시간으로 가져오는 함수
async function fetchRealLottoNumbers(round) {
    try {
        // CORS(보안 차단) 우회를 위해 공공 프록시 서버를 경유하여 동행복권 공식 API 주소로 요청합니다.
        const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=' + round)}`);
        if (!response.ok) return null;
        
        const rawData = await response.json();
        const data = JSON.parse(rawData.contents);
        
        if (data && data.returnValue === "success") {
            return [data.drwtNo1, data.drwtNo2, data.drwtNo3, data.drwtNo4, data.drwtNo5, data.drwtNo6].sort((a,b)=>a-b);
        }
    } catch (e) {
        console.error(e);
    }
    return null;
}

async function startAnalysis() {
    const targetRound = parseInt(document.getElementById('th-input').value);
    if (isNaN(targetRound) || targetRound < 1010) { alert("1010회 이상의 회차를 입력해주세요."); return; }
    
    const statusBox = document.getElementById('engine-status');
    const container = document.getElementById('ball-container');
    const analysisBox = document.getElementById('analysis-box');
    
    statusBox.innerText = "⏳ 동행복권 서버에서 실제 당첨 데이터 수집 중...";
    statusBox.style.color = "#d97706";
    statusBox.style.background = "#fffbeb";
    statusBox.style.borderColor = "#fef3c7";
    
    // 1. 10회 단위 과거 회차 목록 추출 (예: 1225 -> 1215, 1205, 1195, 1185, 1175)
    let checkRounds = [];
    let currentCheck = targetRound - 10;
    while (currentCheck >= 1000 && checkRounds.length < 5) { // 최근 흐름 5개 회차 집중 역추적
        checkRounds.push(currentCheck);
        currentCheck -= 10;
    }
    
    let numberFrequency = {};
    let validRounds = [];
    let ratioPatterns = { "6:0": 0, "5:1": 0, "4:2": 0, "3:3": 0, "2:4": 0, "1:5": 0, "0:6": 0 };
    
    // 2. 과거 회차 실시간 원격 전수조사
    for (let round of checkRounds) {
        const nums = await fetchRealLottoNumbers(round);
        if (nums && nums.length === 6) {
            validRounds.push(round);
            let oCount = 0; let eCount = 0;
            nums.forEach(n => {
                if (n % 2 === 0) eCount++; else oCount++;
                numberFrequency[n] = (numberFrequency[n] || 0) + 1;
            });
            let patternKey = `${oCount}:${eCount}`;
            if (ratioPatterns[patternKey] !== undefined) ratioPatterns[patternKey]++;
        }
    }
    
    if (validRounds.length === 0) {
        alert("인터넷 연결을 확인하시거나, 동행복권 서버 응답이 늦어지고 있습니다. 잠시 후 다시 시도해 주세요.");
        statusBox.innerText = "❌ 데이터 수집 실패";
        return;
    }

    // 3. 가장 많이 나타난 홀짝 황금비율 계산
    let bestPattern = "3:3"; 
    let maxPatternCount = -1;
    for (let key in ratioPatterns) {
        if (ratioPatterns[key] > maxPatternCount) {
            maxPatternCount = ratioPatterns[key];
            bestPattern = key;
        }
    }
    
    let targetOddTarget = parseInt(bestPattern.split(":")[0]); 
    let targetEvenTarget = parseInt(bestPattern.split(":")[1]); 

    // 중복 패턴 번호 스캔
    let duplicatePatterns = [];
    for (let num in numberFrequency) { if (numberFrequency[num] >= 2) { duplicatePatterns.push(parseInt(num)); } }
    
    // 빈도순 정렬
    let pool = Object.keys(numberFrequency).map(Number);
    pool.sort((a, b) => numberFrequency[b] - numberFrequency[a]);
    
    // 4. 추출 개수 제한에 맞춘 추천 번호 빌딩
    let finalNumbers = [];
    let currentOdd = 0;
    let currentEven = 0;

    for (let n of pool) {
        if (finalNumbers.length >= 6) break;
        if (n % 2 !== 0 && currentOdd < targetOddTarget) { finalNumbers.push(n); currentOdd++; }
        else if (n % 2 === 0 && currentEven < targetEvenTarget) { finalNumbers.push(n); currentEven++; }
    }
    
    // 모자란 부분 안전 보충
    while (finalNumbers.length < 6) {
        let rand = Math.floor(Math.random() * 45) + 1;
        if (finalNumbers.includes(rand)) continue;
        if (rand % 2 !== 0 && currentOdd < targetOddTarget) { finalNumbers.push(rand); currentOdd++; }
        else if (rand % 2 === 0 && currentEven < targetEvenTarget) { finalNumbers.push(rand); currentEven++; }
        else if (currentOdd >= targetOddTarget && currentEven >= targetEvenTarget) { finalNumbers.push(rand); }
    }
    
    finalNumbers.sort((a, b) => a - b);
    
    // 5. 화면에 실제 데이터 기반 결과 강제 주입
    container.innerHTML = '';
    finalNumbers.forEach(n => {
        const ball = document.createElement('div'); ball.classList.add('ball');
        if (n <= 10) ball.classList.add('range1'); 
        else if (n <= 20) ball.classList.add('range2'); 
        else if (n <= 30) ball.classList.add('range3'); 
        else if (n <= 40) ball.classList.add('range4'); 
        else ball.classList.add('range5');
        ball.innerText = n; container.appendChild(ball);
    });
    
    // 통계 로그 텍스트 작성
    let ratioLog = [];
    for (let key in ratioPatterns) {
        if (ratioPatterns[key] > 0) {
            ratioLog.push(`<strong>[홀${key.split(':')[0]}:짝${key.split(':')[1]}]</strong> 비율(${ratioPatterns[key]}회)`);
        }
    }
    
    statusBox.innerText = "✅ 동행복권 실시간 데이터 분석 성공";
    statusBox.style.color = "#16a34a";
    statusBox.style.background = "#f0fdf4";
    statusBox.style.borderColor = "#bbf7d0";

    analysisBox.innerHTML = `
        🎯 <strong>[규칙 1: 역추적 회차]</strong><br> 입력하신 ${targetRound}회 분석을 위해 동행복권 서버에서 10회 단위 과거 회차인 <strong>${validRounds.join('회, ')}회</strong>의 실제 당첨 번호 원본을 실시간으로 가져왔습니다.<br><br>
        🌓 <strong>[규칙 2: 홀짝 비율 전수조사]</strong><br> 수집된 실제 당첨조합들의 홀짝 구성비 분석 결과:<br> - ${ratioLog.join('<br> - ')} 발견되었습니다.<br> 이 중 과거 흐름상 가장 우세했던 <strong>[홀수 ${targetOddTarget}개 : 짝수 ${targetEvenTarget}개] 패턴</strong>을 이번 추첨 조합에 자로 잰 듯 정확하게 적용했습니다.<br><br>
        🔄 <strong>[규칙 3: 반복 패턴 번호]</strong><br> 위 실제 회차들 사이에서 2회 이상 중복 출현했던 번호는 <strong>${duplicatePatterns.length > 0 ? duplicatePatterns.join(', ') + '번' : '없음'}</strong> 입니다.<br><br>
        ⚙️ <strong>[규칙 4: 연산 필터링]</strong><br> 대한민국 공식 원본 데이터를 기반으로 오차 없이 모든 비법 필터링을 완료했습니다.
    `;
}
</script>
</body>
</html>
