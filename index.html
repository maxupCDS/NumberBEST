
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 비법 로또 추첨기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --card2: #21253a;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --text: #e8eaf6;
            --muted: #7b80a0;
            --border: rgba(108,99,255,0.2);
            --ball1: #f5a623; --ball2: #4a90e2; --ball3: #e74c3c; --ball4: #9b59b6; --ball5: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px 16px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 배경 효과 */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(108,99,255,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 460px;
            position: relative;
            z-index: 1;
        }

        /* 헤더 */
        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-top: 10px;
        }
        .header .emoji { font-size: 2.4rem; display: block; margin-bottom: 8px; }
        .header h1 {
            font-size: 1.35rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1.4;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 6px;
        }

        /* 카드 */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 16px;
        }

        /* 상태 배지 */
        .api-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(39,174,96,0.12);
            border: 1px solid rgba(39,174,96,0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #2ecc71;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .api-badge .dot {
            width: 8px; height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

        /* 입력 */
        .input-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .round-hint {
            font-size: 0.72rem;
            color: var(--accent);
            background: rgba(108,99,255,0.12);
            padding: 2px 8px;
            border-radius: 20px;
        }
        .input-row {
            display: flex;
            gap: 10px;
        }
        input[type=number] {
            flex: 1;
            padding: 13px 16px;
            background: #0f1117;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type=number]:focus { outline: none; border-color: var(--accent); }

        .btn {
            padding: 13px 20px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.1s;
            font-family: inherit;
        }
        .btn:active { opacity: 0.85; transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 결과 섹션 */
        .section-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* 볼 */
        .ball-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            min-height: 56px;
            margin-bottom: 8px;
        }
        .ball {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.05rem;
            color: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            animation: ballPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both;
            flex-shrink: 0;
        }
        @keyframes ballPop { from{transform:scale(0) rotate(-15deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
        .ball.r1{background:linear-gradient(135deg,#f5a623,#f39c12);}
        .ball.r2{background:linear-gradient(135deg,#4a90e2,#2980b9);}
        .ball.r3{background:linear-gradient(135deg,#e74c3c,#c0392b);}
        .ball.r4{background:linear-gradient(135deg,#9b59b6,#8e44ad);}
        .ball.r5{background:linear-gradient(135deg,#27ae60,#219a52);}

        .ball-placeholder {
            color: var(--muted);
            font-size: 0.85rem;
            width: 100%;
            text-align: center;
        }

        /* 분석 박스 */
        .analysis-box {
            background: #0f1117;
            border-radius: 12px;
            padding: 16px;
            font-size: 0.83rem;
            line-height: 1.8;
            color: #c5c9e0;
            min-height: 80px;
        }
        .analysis-box strong { color: #fff; }
        .analysis-box .tag {
            display: inline-block;
            background: rgba(108,99,255,0.15);
            color: var(--accent);
            border-radius: 6px;
            padding: 1px 7px;
            font-size: 0.78rem;
            font-weight: 700;
            margin: 1px 2px;
        }

        /* 로딩 */
        .loader {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 700;
            padding: 8px 0;
        }
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(108,99,255,0.25);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* 에러 */
        .error-box {
            background: rgba(231,76,60,0.1);
            border: 1px solid rgba(231,76,60,0.3);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.82rem;
            color: #e74c3c;
        }

        /* 색상 범례 */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.73rem;
            color: var(--muted);
        }
        .legend-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }

        /* 정보 박스 */
        .info-box {
            background: rgba(108,99,255,0.07);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 12px;
        }
        .info-box span { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span class="emoji">🔮</span>
        <h1>나만의 비법 로또 추첨기</h1>
        <p>동행복권 공식 실제 데이터 기반 분석</p>
    </div>

    <div class="card">
        <div class="api-badge">
            <div class="dot"></div>
            동행복권 공식 API 실시간 연동
        </div>

        <div class="input-label">
            <span>분석할 회차 입력</span>
            <span class="round-hint" id="latest-hint">최신 회차 확인 중...</span>
        </div>
        <div class="input-row">
            <input type="number" id="th-input" value="1224" min="1" max="9999">
            <button class="btn" onclick="analyzeAndGenerate()" id="run-btn">즉시 추첨 🎯</button>
        </div>
        <div class="info-box">
            ⚡ 10회 단위 과거 <span>실제 당첨번호</span>를 API로 직접 가져와 홀짝·빈도 분석 후 번호를 추출합니다.
        </div>
    </div>

    <div class="card">
        <div class="section-title">추천 번호</div>
        <div class="ball-row" id="ball-container">
            <span class="ball-placeholder">위 버튼을 눌러 추첨하세요</span>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div>1~10</div>
            <div class="legend-item"><div class="legend-dot" style="background:#4a90e2"></div>11~20</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div>21~30</div>
            <div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div>31~40</div>
            <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>41~45</div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">📊 알고리즘 분석 결과</div>
        <div class="analysis-box" id="analysis-box">
            버튼을 누르면 과거 10회 단위 실제 당첨 데이터의 홀짝 비율 전수조사 통계가 실시간 표시됩니다.
        </div>
    </div>
</div>

<script>
// ─── 동행복권 공식 API로 실제 당첨번호 가져오기 ───
const API_PROXY = 'https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo=';
const cache = {};

async function fetchLottoRound(round) {
    if (cache[round]) return cache[round];
    try {
        const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(API_PROXY + round)}`);
        const data = await res.json();
        if (data.returnValue === 'success') {
            const nums = [data.drwtNo1, data.drwtNo2, data.drwtNo3, data.drwtNo4, data.drwtNo5, data.drwtNo6].sort((a,b)=>a-b);
            cache[round] = nums;
            return nums;
        }
    } catch(e) {}
    return null;
}

// 최신 회차 자동 탐지
async function detectLatestRound() {
    // 1224회부터 내려가며 유효한 최신 회차 탐지
    for (let r = 1230; r >= 1200; r--) {
        const data = await fetchLottoRound(r);
        if (data) {
            document.getElementById('latest-hint').textContent = `현재 최신: ${r}회`;
            document.getElementById('th-input').value = r;
            return r;
        }
    }
    document.getElementById('latest-hint').textContent = '회차 직접 입력';
}

// 페이지 로드 시 최신 회차 자동 감지
window.addEventListener('load', () => detectLatestRound());

async function analyzeAndGenerate() {
    const targetRound = parseInt(document.getElementById('th-input').value);
    if (isNaN(targetRound) || targetRound < 1) {
        alert("올바른 회차를 입력해주세요.");
        return;
    }

    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = '분석 중...';

    const ballContainer = document.getElementById('ball-container');
    const analysisBox = document.getElementById('analysis-box');

    ballContainer.innerHTML = '<div class="loader"><div class="spinner"></div>실제 데이터 수신 중...</div>';
    analysisBox.innerHTML = '<div class="loader"><div class="spinner"></div>동행복권 API 조회 중...</div>';

    // 10회 단위 과거 회차 목록
    let checkRounds = [];
    let cur = targetRound - 10;
    while (cur >= Math.max(1, targetRound - 510)) {
        checkRounds.push(cur);
        cur -= 10;
        if (checkRounds.length >= 30) break;
    }

    // 병렬 API 호출
    analysisBox.innerHTML = `<div class="loader"><div class="spinner"></div>${checkRounds.length}개 회차 실시간 API 조회 중...</div>`;

    const results = await Promise.all(checkRounds.map(r => fetchLottoRound(r)));

    // 유효한 결과만 필터
    let validPairs = [];
    for (let i = 0; i < checkRounds.length; i++) {
        if (results[i]) validPairs.push({ round: checkRounds[i], nums: results[i] });
    }

    if (validPairs.length === 0) {
        ballContainer.innerHTML = '<div class="ball-placeholder">⚠️ 데이터를 가져오지 못했습니다</div>';
        analysisBox.innerHTML = '<div class="error-box">❌ API 연결에 실패했습니다. 잠시 후 다시 시도해 주세요.</div>';
        btn.disabled = false;
        btn.textContent = '즉시 추첨 🎯';
        return;
    }

    // ── 홀짝 비율 전수조사 ──
    let ratioPatterns = { "6:0": 0, "5:1": 0, "4:2": 0, "3:3": 0, "2:4": 0, "1:5": 0, "0:6": 0 };
    let numberFrequency = {};

    validPairs.forEach(({ nums }) => {
        let odd = 0, even = 0;
        nums.forEach(n => {
            if (n % 2 !== 0) odd++; else even++;
            numberFrequency[n] = (numberFrequency[n] || 0) + 1;
        });
        const key = `${odd}:${even}`;
        if (ratioPatterns[key] !== undefined) ratioPatterns[key]++;
    });

    // 최다 홀짝 비율 찾기
    let bestPattern = "3:3";
    let maxCount = -1;
    for (let key in ratioPatterns) {
        if (ratioPatterns[key] > maxCount) { maxCount = ratioPatterns[key]; bestPattern = key; }
    }
    const targetOdd = parseInt(bestPattern.split(":")[0]);
    const targetEven = parseInt(bestPattern.split(":")[1]);

    // 중복 번호 찾기
    let duplicates = Object.keys(numberFrequency).map(Number).filter(n => numberFrequency[n] >= 2);

    // 빈도순 정렬 풀
    let pool = Object.keys(numberFrequency).map(Number);
    pool.sort((a,b) => numberFrequency[b] - numberFrequency[a]);

    // 번호 추출
    let finalNums = [];
    let curOdd = 0, curEven = 0;
    for (let n of pool) {
        if (finalNums.length >= 6) break;
        if (n % 2 !== 0 && curOdd < targetOdd) { finalNums.push(n); curOdd++; }
        else if (n % 2 === 0 && curEven < targetEven) { finalNums.push(n); curEven++; }
    }
    // 부족하면 랜덤 보충
    let safety = 0;
    while (finalNums.length < 6 && safety++ < 1000) {
        let rand = Math.floor(Math.random() * 45) + 1;
        if (finalNums.includes(rand)) continue;
        if (rand % 2 !== 0 && curOdd < targetOdd) { finalNums.push(rand); curOdd++; }
        else if (rand % 2 === 0 && curEven < targetEven) { finalNums.push(rand); curEven++; }
        else if (curOdd >= targetOdd && curEven >= targetEven) finalNums.push(rand);
    }
    finalNums.sort((a,b) => a-b);

    // ── 볼 렌더링 ──
    ballContainer.innerHTML = '';
    finalNums.forEach((n, i) => {
        const ball = document.createElement('div');
        ball.classList.add('ball');
        if (n <= 10) ball.classList.add('r1');
        else if (n <= 20) ball.classList.add('r2');
        else if (n <= 30) ball.classList.add('r3');
        else if (n <= 40) ball.classList.add('r4');
        else ball.classList.add('r5');
        ball.style.animationDelay = `${i * 80}ms`;
        ball.textContent = n;
        ballContainer.appendChild(ball);
    });

    // ── 분석 텍스트 ──
    let ratioLog = Object.entries(ratioPatterns)
        .filter(([,v]) => v > 0)
        .sort(([,a],[,b]) => b-a)
        .map(([k,v]) => {
            const [o,e] = k.split(':');
            const isTop = k === bestPattern;
            return `<span class="tag${isTop ? '" style="background:rgba(108,99,255,0.3' : ''}">${isTop ? '⭐ ' : ''}홀${o}:짝${e}</span> ${v}회${isTop ? ' ← 선택' : ''}`;
        }).join('<br>');

    const usedRoundsStr = validPairs.slice(0,3).map(p=>`${p.round}회`).join(', ');
    const dupStr = duplicates.length > 0 ? duplicates.sort((a,b)=>a-b).join(', ') + '번' : '없음';

    analysisBox.innerHTML = `
🎯 <strong>[규칙 1: 역추적 회차]</strong><br>
${targetRound}회 분석을 위해 <strong>${usedRoundsStr}... 등 총 ${validPairs.length}개 회차</strong>의 <strong>실제 당첨번호</strong>를 동행복권 API로 수신했습니다.<br><br>
🌓 <strong>[규칙 2: 홀짝 비율 전수조사]</strong><br>
${ratioLog}<br>
→ 가장 강했던 <strong>[홀${targetOdd}:짝${targetEven}]</strong> 법칙으로 선별<br><br>
🔄 <strong>[규칙 3: 누적 반복 패턴]</strong><br>
2회 이상 반복 출현 번호: <strong>${dupStr}</strong><br><br>
✅ <strong>[규칙 4: 결과]</strong><br>
동행복권 공식 실제 데이터 ${validPairs.length}개 회차 기반 추출 완료
    `;

    btn.disabled = false;
    btn.textContent = '즉시 추첨 🎯';
}
</script>
</body>
</html>
