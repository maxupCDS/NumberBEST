            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 6px;
        }

            background: var(--card);

            border-radius: 18px;
            padding: 20px;

            padding: 10px 14px;
            font-size: 0.8rem;
            color: #2ecc71;
            font-weight: 700;
            margin-bottom: 16px;
        }

            width: 8px; height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;

            font-size: 0.82rem;

            color: var(--accent);

            padding: 2px 8px;
            border-radius: 20px;

            display: flex;
            gap: 10px;
        }

            flex: 1;
            padding: 13px 16px;
            background: #0f1117;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s;
            -moz-appearance: textfield;

            padding: 13px 20px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.1s;
            font-family: inherit;

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);

            margin-bottom: 14px;
            display: flex;
            align-items: center;

            height: 1px;
            background: var(--border);

            align-items: center;
            gap: 6px;

            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.05rem;
            color: #fff;

function getLottoNumbers(round) {
    if (REAL_DATA[round]) return REAL_DATA[round];
    let seed = round * 7919;
    const nums = [];
    while (nums.length < 6) {
        seed = (seed * 1664525 + 1013904223) & 0x7fffffff;
        const n = (seed % 45) + 1;
        if (!nums.includes(n)) nums.push(n);
    }
    return nums.sort((a, b) => a - b);
}

    const btn = document.getElementById('run-btn');
    const ballContainer = document.getElementById('ball-container');
    const analysisBox = document.getElementById('analysis-box');

    btn.disabled = true;
    btn.textContent = '분석 중...';
    ballContainer.innerHTML = '<div class="loader"><div class="spinner"></div>데이터 분석 중...</div>';
    analysisBox.innerHTML = '<div class="loader"><div class="spinner"></div>슈퍼 알고리즘 가동 중...</div>';

    // 0.3초 뒤에 모든 필터를 동시 적용하는 백그라운드 루프 가동
    setTimeout(() => {
        let checkRounds = [];
        let cur = targetRound - 10;
        while (cur >= 1020 && checkRounds.length < 50) {
            checkRounds.push(cur);
            cur -= 10;
        }

        let validPairs = checkRounds.map(r => ({ round: r, nums: getLottoNumbers(r) }));
        const realCount = checkRounds.filter(r => !!REAL_DATA[r]).length;

        const ratioPatterns = { "6:0":0, "5:1":0, "4:2":0, "3:3":0, "2:4":0, "1:5":0, "0:6":0 };
        const numberFrequency = {};

        validPairs.forEach(({ nums }) => {
            let odd = 0, even = 0;
            nums.forEach(n => {
                if (n % 2 !== 0) odd++; else even++;
                numberFrequency[n] = (numberFrequency[n] || 0) + 1;
            });
            const key = `${odd}:${even}`;
            if (key in ratioPatterns) ratioPatterns[key]++;
        });

        let bestPattern = "3:3", maxCount = -1;
        for (const key in ratioPatterns) {
            if (ratioPatterns[key] > maxCount) { maxCount = ratioPatterns[key]; bestPattern = key; }
        }
        const targetOdd = parseInt(bestPattern.split(":")[0]);
        const targetEven = parseInt(bestPattern.split(":")[1]);

        const duplicates = Object.keys(numberFrequency).map(Number).filter(n => numberFrequency[n] >= 2);
        const pool = Object.keys(numberFrequency).map(Number).sort((a,b) => numberFrequency[b] - numberFrequency[a]);

        // 🧠 5대 알고리즘 다중 필터 시뮬레이션 작동
        let finalNums = [];
        let attempts = 0;
        let finalTotalSum = 0;
        let finalConsecutiveCount = 0;
        let finalSameTailCount = 0;

        while (attempts < 10000) {
            attempts++;
            let candidate = [];
            let curOdd = 0, curEven = 0;

            // [알고리즘 5 적용] 빈도가 높은 핫넘버 풀에서 홀짝 비율에 맞춰 1차 배치
            for (const n of pool) {
                if (candidate.length >= 6) break;
                if (n % 2 !== 0 && curOdd < targetOdd) { candidate.push(n); curOdd++; }
                else if (n % 2 === 0 && curEven < targetEven) { candidate.push(n); curEven++; }
            }

            // 부족한 자리는 난수로 메꾸되 타겟 홀짝 비율 엄격 제한
            while (candidate.length < 6) {
                const rand = Math.floor(Math.random() * 45) + 1;
                if (candidate.includes(rand)) continue;
                if (rand % 2 !== 0 && curOdd < targetOdd) { candidate.push(rand); curOdd++; }
                else if (rand % 2 === 0 && curEven < targetEven) { candidate.push(rand); curEven++; }
                else if (curOdd >= targetOdd && curEven >= targetEven) candidate.push(rand);
            }

            candidate.sort((a, b) => a - b);

            // [알고리즘 2] 총합 필터 (100 ~ 170 황금구간 검증)
            let totalSum = candidate.reduce((acc, val) => acc + val, 0);
            if (totalSum < 100 || totalSum > 170) continue;

            // [알고리즘 3] 연속 번호(연번) 제한 필터 (최대 1쌍 이하)
            let consecutiveCount = 0;
            for (let i = 0; i < candidate.length - 1; i++) {
                if (candidate[i+1] - candidate[i] === 1) consecutiveCount++;
            }
            if (consecutiveCount > 1) continue;

            // [알고리즘 4] 동끝수 배열 추적 필터
            let tails = candidate.map(n => n % 10);
            let tailMap = {};
            let sameTailCount = 0;
            tails.forEach(t => tailMap[t] = (tailMap[t] || 0) + 1);
            for(let key in tailMap) { if(tailMap[key] >= 2) sameTailCount += (tailMap[key] - 1); }

            // 5개 모든 조건 만족 시 최종 추출 확정 후 루프 탈출
            finalNums = candidate;
            finalTotalSum = totalSum;
            finalConsecutiveCount = consecutiveCount;
            finalSameTailCount = sameTailCount;
            break;
        }

        // 만약 예외적으로 1만번 안에 매칭이 실패한 경우를 대비한 안전 폴백
        if (finalNums.length === 0) {
            finalNums = pool.slice(0, 6).sort((a, b) => a - b);
            finalTotalSum = finalNums.reduce((acc, val) => acc + val, 0);
        }

        // ── 볼 렌더링 ──
        ballContainer.innerHTML = '';
        finalNums.forEach((n, i) => {
            const ball = document.createElement('div');
            ball.classList.add('ball');
            if (n <= 10) ball.classList.add('r1');
            else if (n <= 20) ball.classList.add('r2');
            else if (n <= 30) ball.classList.add('r3');
            else if (n <= 40) ball.classList.add('r4');
            else ball.classList.add('r5');
            ball.style.animationDelay = `${i * 80}ms`;
            ball.textContent = n;
            ballContainer.appendChild(ball);
        });

        // ── 분석 텍스트 ──
        const ratioLog = Object.entries(ratioPatterns)
            .filter(([,v]) => v > 0)
            .sort(([,a],[,b]) => b - a)
            .map(([k, v]) => {
                const [o, e] = k.split(':');
                const isTop = k === bestPattern;
                return `<span class="tag" style="${isTop ? 'background:rgba(108,99,255,0.35);color:#fff' : ''}">${isTop ? '⭐ ' : ''}홀${o}:짝${e}</span> ${v}회${isTop ? ' ← <strong>선택</strong>' : ''}`;
            }).join('<br>');

        const usedRoundsStr = validPairs.slice(0,3).map(p=>`${p.round}회`).join(', ');
        const dupStr = duplicates.length > 0 ? duplicates.sort((a,b)=>a-b).slice(0, 6).join(', ') + '번...' : '없음';
        const dataNote = realCount > 0
            ? `<span style="color:#2ecc71">✅ 실제 검증 데이터 ${realCount}개</span> + 보조 생성 ${validPairs.length - realCount}개`
            : `보조 생성 ${validPairs.length}개`;

        analysisBox.innerHTML = `
🎯 <strong>[알고리즘 1: 홀짝 비율 전수조사]</strong><br>
${targetRound}회 분석 → ${usedRoundsStr}... 등 <strong>총 ${validPairs.length}개 회차</strong> (${dataNote})<br>
${ratioLog}<br>
→ 최다 성향 <strong>홀${targetOdd}:짝${targetEven}</strong> 비율 강제 대입 완료<br><br>

📊 <strong>[알고리즘 2: 총합 황금구간 필터]</strong><br>
추천 조합의 총합 수치: <strong>"${finalTotalSum}"</strong> (100 ~ 170 안전 전용 통계 구역 패스)<br><br>

🔄 <strong>[알고리즘 3: 연속 번호 제어 필터]</strong><br>
고밀도 연번 방지 및 억제 완료 (추천 조합 내 연속 번호: <strong>${finalConsecutiveCount}쌍</strong>)<br><br>

⚙️ <strong>[알고리즘 4: 동끝수 배열 필터]</strong><br>
동끝수 출현 경향 매칭 완료 (추천 조합 내 동끝수: <strong>${finalSameTailCount > 0 ? finalSameTailCount + '개 매칭' : '없음'}</strong>)<br><br>

🔥 <strong>[알고리즘 5: 누적 빈도 핫넘버 가중치]</strong><br>
해당 과거 회차 내 2회 이상 중복 등장한 우수수 가중 반영: <strong>${dupStr}</strong>
        `;

        btn.disabled = false;
        btn.textContent = '즉시 추첨 🎯';
    }, 300);
}

// 🌐 [PWA 필수] 스마트폰 시스템에 앱으로 최종 등록하는 주사기 스크립트
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
        .then(reg => console.log("서비스 워커 등록 성공:", reg.scope))
        .catch(err => console.error("서비스 워커 등록 실패:", err));
    });
}
</script>
