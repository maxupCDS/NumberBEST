<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 데이터 반영 - 비법 로또 추첨기</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-color: #ffffff;
            --primary-color: #2563eb;
            --text-color: #1f2937;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-color);
        }
        .status-box {
            background: #f0fdf4;
            color: #16a34a;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active {
            background: #1d4ed8;
        }
        .result-section {
            margin-top: 30px;
            display: none;
        }
        .ball-container {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .ball.range1 { background: #fbc02d; }
        .ball.range2 { background: #1976d2; }
        .ball.range3 { background: #d32f2f; }
        .ball.range4 { background: #7b1fa2; }
        .ball.range5 { background: #388e3c; }

        .analysis-box {
            background: #f8fafc;
            border-radius: 10px;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.6;
            border-left: 4px solid var(--primary-color);
        }
        .loading {
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 실시간 데이터 반영<br>나만의 비법 로또 추첨기</h1>
    
    <div class="status-box" id="status-box">데이터 동기화 준비 중...</div>
    
    <div class="input-group">
        <label for="th-input">예측/분석할 회차 입력 (1000회 이후)</label>
        <input type="number" id="th-input" placeholder="예: 1225" value="1225">
    </div>

    <button onclick="startAnalysis()">실시간 데이터 분석 및 추첨</button>
    <div class="loading" id="loading">로또 당첨 데이터를 실시간 분석 중입니다...</div>

    <div class="result-section" id="result-section">
        <h3>추천 번호</h3>
        <div class="ball-container" id="ball-container"></div>
        
        <h3>📊 알고리즘 분석 결과</h3>
        <div class="analysis-box" id="analysis-box"></div>
    </div>
</div>

<script>
let allLottoData = [];

// 앱이 켜지자마자 공공 데이터 저장소에서 로또 당첨 내역 전체를 실시간으로 받아옵니다.
async function loadLottoData() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/the-vrew/open-lotto-data/main/lotto_history.json');
        allLottoData = await response.json();
        document.getElementById('status-box').innerText = `✅ 최신 데이터 동기화 완료 (${allLottoData.length}회차까지 확보)`;
    } catch (error) {
        document.getElementById('status-box').style.backgroundColor = '#fef2f2';
        document.getElementById('status-box').style.color = '#dc2626';
        document.getElementById('status-box').innerText = '❌ 데이터 로드 실패 (네트워크를 확인하세요)';
    }
}

// 앱 실행 시 자동으로 데이터 가져오기
loadLottoData();

function startAnalysis() {
    if (allLottoData.length === 0) {
        alert("데이터가 아직 로드되지 않았습니다. 잠시만 기다려주세요.");
        return;
    }

    const targetRound = parseInt(document.getElementById('th-input').value);
    if (isNaN(targetRound) || targetRound < 1000) {
        alert("1000회 이상의 올바른 회차를 입력해주세요.");
        return;
    }

    document.getElementById('loading').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';

    // 분석을 위해 약간의 딜레이 체감(0.5초) 후 결과 도출
    setTimeout(() => {
        analyzeAndGenerate(targetRound);
    }, 500);
}

function analyzeAndGenerate(targetRound) {
    // 1. 입력한 회차 기준, 10회 단위 과거 회차 목록 추출 (1000회 이후부터만)
    let checkRounds = [];
    let currentCheck = targetRound - 10;
    while (currentCheck >= 1000) {
        checkRounds.push(currentCheck);
        currentCheck -= 10;
    }

    if (checkRounds.length === 0) {
        alert("분석할 과거 10회 단위 데이터가 부족합니다. 더 높은 회차를 입력하세요.");
        document.getElementById('loading').style.display = 'none';
        return;
    }

    // 2. 실제 데이터 매핑 및 홀짝 분별
    let collectedNumbers = [];
    let oddCount = 0;
    let evenCount = 0;
    let numberFrequency = {}; // 각 번호의 출현 빈도

    // 추출된 과거 회차 루프
    let validRounds = [];
    checkRounds.forEach(round => {
        // 오픈소스 데이터셋 구조에 맞춰 해당 회차 데이터 찾기
        const roundData = allLottoData.find(item => item.round === round);
        if (roundData && roundData.numbers) {
            validRounds.push(round);
            const nums = roundData.numbers; // [num1, num2, num3, num4, num5, num6]
            collectedNumbers.push(...nums);

            nums.forEach(n => {
                // 홀짝 카운트
                if (n % 2 === 0) evenCount++; else oddCount++;
                // 번호별 빈도 기록
                numberFrequency[n] = (numberFrequency[n] || 0) + 1;
            });
        }
    });

    // 3. 단계별 같은 번호 패턴(중복 출현) 찾기
    let duplicatePatterns = [];
    for (let num in numberFrequency) {
        if (numberFrequency[num] >= 2) {
            duplicatePatterns.push(parseInt(num));
        }
    }

    // 4. 특정번호 이후 고정번호 인과관계 추적 (예시 규칙 기반)
    let fixedNumbers = [];
    // 과거 10회 단위 내에서 [특정수 출현 -> 다음 10회차에 고정수] 패턴을 실시간 검색
    for(let i=0; i < validRounds.length - 1; i++) {
        const pastRound = allLottoData.find(item => item.round === validRounds[i+1]);
        const nextRound = allLottoData.find(item => item.round === validRounds[i]);
        
        if(pastRound && nextRound) {
            // 과거 회차에 10번이 있었고 그 다음 10회차 뒤에 9번이 나온 인과관계 매칭 검증 예시
            if(pastRound.numbers.includes(10) && nextRound.numbers.includes(9)) {
                // 이번 기준 직전 회차(targetRound-10)에 10번이 있다면 규칙에 따라 9번을 강력 고정수로 지정
                const immediatePast = allLottoData.find(item => item.round === targetRound - 10);
                if(immediatePast && immediatePast.numbers.includes(10)) {
                    if(!fixedNumbers.includes(9)) fixedNumbers.push(9);
                }
            }
        }
    }

    // 번호 풀 정렬 (많이 나온 순)
    let pool = Object.keys(numberFrequency).map(Number);
    pool.sort((a, b) => numberFrequency[b] - numberFrequency[a]);

    // 최종 번호 조합 생성 (고정수 배치 후 홀짝 성향 반영)
    let finalNumbers = [...fixedNumbers];
    const preferOdd = oddCount >= evenCount; // 홀수가 많이 나왔으면 true

    // 조건에 맞춰 번호 도출
    for (let n of pool) {
        if (finalNumbers.length >= 6) break;
        if (finalNumbers.includes(n)) continue;

        if (preferOdd && n % 2 !== 0) finalNumbers.push(n);
        else if (!preferOdd && n % 2 === 0) finalNumbers.push(n);
        else if (finalNumbers.length > 4) finalNumbers.push(n); // 공간 부족 시 채우기
    }

    // 데이터 모자랄 경우 랜덤 보정
    while (finalNumbers.length < 6) {
        let rand = Math.floor(Math.random() * 45) + 1;
        if (!finalNumbers.includes(rand)) finalNumbers.push(rand);
    }

    finalNumbers.sort((a, b) => a - b);

    // 결과 노출
    document.getElementById('loading').style.display = 'none';
    displayResult(finalNumbers, targetRound, validRounds, oddCount, evenCount, duplicatePatterns, fixedNumbers);
}

function displayResult(nums, target, pasts, odd, even, patterns, fixed) {
    document.getElementById('result-section').style.display = 'block';
    
    const container = document.getElementById('ball-container');
    container.innerHTML = '';
    
    nums.forEach(n => {
        const ball = document.createElement('div');
        ball.classList.add('ball');
        if (n <= 10) ball.classList.add('range1');
        else if (n <= 20) ball.classList.add('range2');
        else if (n <= 30) ball.classList.add('range3');
        else if (n <= 40) ball.classList.add('range4');
        else ball.classList.add('range5');
        
        ball.innerText = n;
        container.appendChild(ball);
    });

    const total = odd + even;
    const oddRatio = Math.round((odd/total)*100);
    const evenRatio = Math.round((even/total)*100);

    let analysisText = `
        <strong>[분석된 10회 단위 과거 회차]</strong><br> 총 ${pasts.length}개 회차 추적 완료<br>(${pasts.slice(0, 5).join(', ')}... 등)<br><br>
        <strong>[규칙 2] 과거 홀짝 통계</strong><br> 홀수 ${oddCount}회(${oddRatio}%) vs 짝수 ${evenCount}회(${evenRatio}%) -> <strong>${preferOddText = odd >= even ? '홀수 우선' : '짝수 우선'} 배정</strong><br><br>
        <strong>[규칙 3] 중복 패턴 발견 번호</strong><br> ${patterns.length > 0 ? patterns.slice(0, 10).join(', ') + '번 등' : '없음'}<br><br>
        <strong>[규칙 4] 고정수 인과 추적 완료</strong><br> 조건 부합 고정수: ${fixed.length > 0 ? fixed.join(', ') + '번 포착!' : '이번 회차 해당 조건 없음'}
    `;
    document.getElementById('analysis-box').innerHTML = analysisText;
}
</script>

</body>
</html>
